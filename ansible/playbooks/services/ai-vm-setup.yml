---
- name: Setup AI VM with Ollama and TinyLlama
  hosts: ai-vm
  become: yes
  gather_facts: yes
  vars:
    ollama_model: tinyllama
    ollama_port: 11434
    ollama_data_dir: /opt/ollama

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Install Ollama
      shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Create Ollama data directory
      file:
        path: "{{ ollama_data_dir }}"
        state: directory
        owner: ollama
        group: ollama
        mode: "0755"

    - name: Configure Ollama service override
      file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: "0755"

    - name: Set Ollama environment config
      copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        content: |
          [Service]
          Environment="OLLAMA_MODELS={{ ollama_data_dir }}/models"
          Environment="OLLAMA_HOST=0.0.0.0:{{ ollama_port }}"
        mode: "0644"
      notify: Restart Ollama

    - name: Reload systemd and enable Ollama
      systemd:
        name: ollama
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for Ollama to be ready
      wait_for:
        port: "{{ ollama_port }}"
        timeout: 30

    - name: Check if model already exists
      shell: ollama list 2>&1 | grep -i "{{ ollama_model }}"
      environment:
        OLLAMA_HOST: "http://localhost:{{ ollama_port }}"
        OLLAMA_MODELS: "{{ ollama_data_dir }}/models"
        HOME: /home/ollama
      register: model_check
      changed_when: false
      failed_when: false

    - name: Pull TinyLlama model (this may take a few minutes)
      shell: ollama pull {{ ollama_model }} 2>&1
      environment:
        OLLAMA_HOST: "http://localhost:{{ ollama_port }}"
        OLLAMA_MODELS: "{{ ollama_data_dir }}/models"
        HOME: /home/ollama
      register: pull_result
      changed_when: true
      timeout: 600
      when: model_check.rc != 0

    - name: Verify model is listed
      shell: ollama list
      environment:
        OLLAMA_HOST: "http://localhost:{{ ollama_port }}"
        OLLAMA_MODELS: "{{ ollama_data_dir }}/models"
        HOME: /home/ollama
      register: model_list
      changed_when: false

    - name: Show available models
      debug:
        msg: "{{ model_list.stdout_lines }}"

    - name: Smoke test - run a quick inference
      shell: >
        ollama run {{ ollama_model }} "reply with only: ok" 2>&1
      environment:
        OLLAMA_HOST: "http://localhost:{{ ollama_port }}"
        OLLAMA_MODELS: "{{ ollama_data_dir }}/models"
        HOME: /home/ollama
      register: smoke_test
      changed_when: false
      timeout: 120

    - name: Show smoke test result
      debug:
        msg: "{{ smoke_test.stdout_lines }}"

    - name: Print access info
      debug:
        msg:
          - "Ollama is running on http://{{ ansible_host }}:{{ ollama_port }}"
          - "From n8n VM, use: http://192.168.100.250:{{ ollama_port }}"
          - "API endpoint: POST http://192.168.100.250:{{ ollama_port
            }}/api/generate"

  handlers:
    - name: Restart Ollama
      systemd:
        name: ollama
        state: restarted
        daemon_reload: yes
